# Keeps mentor PR #50 in sync: every push/merge to main updates fwdays-submission.
# PR: https://github.com/koldovsky/2026-fwdays-agentic-greenfield-task/pull/50

name: Sync homework PR branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-homework-pr
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into fwdays-submission
        run: |
          git fetch origin fwdays-submission
          git checkout fwdays-submission
          git merge origin/main --no-edit -m "chore: sync main into fwdays-submission [auto]"
          git push origin fwdays-submission

      - name: Update mentor draft PR description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .github/HOMEWORK_SUBMISSION.md ]; then
            gh pr edit 50 \
              --repo koldovsky/2026-fwdays-agentic-greenfield-task \
              --body-file .github/HOMEWORK_SUBMISSION.md
          fi
